name: PR Auto Description

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  fill-description:
    runs-on: ubuntu-latest
    # Los PR desde forks reciben token de solo lectura y no pueden editar el cuerpo.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generar y actualizar descripción del PR
        uses: actions/github-script@v7
        with:
          script: |
            const START = '<!-- auto-summary:start -->';
            const END = '<!-- auto-summary:end -->';
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // Archivos afectados (paginado)
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            // Commits del PR (paginado)
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner, repo, pull_number: pr.number, per_page: 100,
            });

            const statusEmoji = {
              added: '🟢 añadido',
              modified: '🟡 modificado',
              removed: '🔴 eliminado',
              renamed: '🔵 renombrado',
              copied: '🔵 copiado',
              changed: '🟡 modificado',
            };

            const totalAdd = files.reduce((s, f) => s + f.additions, 0);
            const totalDel = files.reduce((s, f) => s + f.deletions, 0);

            const changeLines = commits
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n') || '- _Sin commits._';

            const fileRows = files
              .map(f => `| \`${f.filename}\` | +${f.additions} / -${f.deletions} | ${statusEmoji[f.status] || f.status} |`)
              .join('\n') || '| _Sin archivos._ | | |';

            const summary = [
              START,
              '## 📋 Resumen automático',
              '',
              `**${files.length}** archivo(s) · **+${totalAdd} / -${totalDel}** líneas · **${commits.length}** commit(s)`,
              '',
              '### 📝 Cambios realizados',
              changeLines,
              '',
              '### 📂 Archivos afectados',
              '',
              '| Archivo | Líneas | Estado |',
              '| --- | --- | --- |',
              fileRows,
              '',
              '> _Sección generada automáticamente. Editá el texto fuera de estos marcadores libremente._',
              END,
            ].join('\n');

            const body = pr.body || '';
            let newBody;
            if (body.includes(START) && body.includes(END)) {
              // Reemplazar sección existente (idempotente en synchronize/reopen)
              const re = new RegExp(`${START}[\\s\\S]*?${END}`);
              newBody = body.replace(re, summary);
            } else if (body.trim().length) {
              // Conservar descripción manual, añadir resumen al final
              newBody = `${body.trim()}\n\n${summary}`;
            } else {
              newBody = summary;
            }

            if (newBody !== body) {
              await github.rest.pulls.update({ owner, repo, pull_number: pr.number, body: newBody });
              core.info('Descripción del PR actualizada.');
            } else {
              core.info('Sin cambios en la descripción.');
            }
