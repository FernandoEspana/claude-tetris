<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">THEME</span>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" aria-label="Alternar modo claro/oscuro" />
            <span class="theme-switch-slider"></span>
          </label>
        </div>

        <div class="panel-section">
          <span class="label">SKIN</span>
          <select id="skin-select" class="select">
            <option value="retro">Retro</option>
            <option value="neon">Neon</option>
            <option value="pastel">Pastel</option>
            <option value="pixel">Pixel art</option>
          </select>
        </div>

        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> menú</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay" data-mode="start">
      <div class="overlay-box">
        <p id="overlay-title">TETRIS</p>
        <p id="overlay-score" class="mode-el m-gameover"></p>

        <!-- Records (inicio + game over) -->
        <div id="records" class="records mode-el m-start m-gameover"></div>

        <!-- Entrada de nombre (solo game over si clasifica) -->
        <div id="name-entry" class="name-entry mode-el hidden">
          <label class="name-label">Tu nombre
            <input id="name-input" type="text" maxlength="8" autocomplete="off" placeholder="AAA" />
          </label>
          <button id="save-score-btn" class="btn">Guardar</button>
        </div>

        <!-- Nivel inicial (inicio + pausa) -->
        <label id="startlevel-wrap" class="startlevel mode-el m-start m-pause">Nivel inicial
          <select id="startlevel-select" class="select"></select>
        </label>

        <!-- Lista de controles dentro del menú (toggle) -->
        <ul id="menu-controls" class="menu-controls mode-el hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
          <li><kbd>↓</kbd> soft drop</li>
          <li><kbd>Space</kbd> hard drop</li>
          <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
        </ul>

        <!-- Botones (visibilidad según modo) -->
        <div class="overlay-buttons">
          <button id="start-btn" class="btn mode-el m-start">Empezar</button>
          <button id="resume-btn" class="btn mode-el m-pause">Reanudar</button>
          <button id="restart-btn" class="btn mode-el m-pause m-gameover">Reiniciar</button>
          <button id="controls-btn" class="btn btn-ghost mode-el m-pause">Ver controles</button>
          <button id="reset-scores-btn" class="btn btn-ghost mode-el m-start m-gameover">Resetear records</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
